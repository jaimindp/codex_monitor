<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>100x Codex</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>100x Codex</h1>
      <p>Interactive Linear issue graph inside Electron.</p>
      <div class="card">
        <h2>Linear Issue Graph</h2>
        <p>Interactive Mermaid DAG for Linear issues inside this Electron app.</p>
        <details id="graph-controls-panel" class="graph-controls-panel" open>
          <summary>Connection Settings</summary>
          <div class="graph-controls">
            <label for="linear-api-key">Linear API Key</label>
            <input id="linear-api-key" type="password" placeholder="lin_api_..." />
            <label for="linear-team-key">Team Key</label>
            <input id="linear-team-key" type="text" placeholder="ENG" />
            <div class="row">
              <button id="graph-load-linear" type="button">Load Linear Issues</button>
              <button id="graph-load-mock" type="button">Load Mock Data</button>
            </div>
          </div>
        </details>
        <p id="graph-status">Graph status: idle</p>
        <div class="graph-shell">
          <section>
            <h3>Graph</h3>
            <div id="graph-output" class="graph-output"></div>
          </section>
          <section>
            <h3>Details</h3>
            <div id="graph-details" class="graph-details">Click a node to inspect an issue.</div>
          </section>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
